<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Searchar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Main CSS -->
  <link rel="stylesheet" href="../css/User_Home.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<header class="navbar" style="display:flex; align-items:center; justify-content:space-between; padding:10px; position:sticky; top:0; z-index:2000; background:#fff;">

  <!-- Logo -->
  <div class="navbar-logo">
    <img src="../Images/logo.png" alt="SEARCHAR Logo" class="navbar-logo-img">
  </div>

  <!-- Email + Logout -->
  <div style="display:flex; align-items:center; gap:10px; margin-right:40px;">
    <span>user@email.com</span>
    <button class="navbar-donate"
      onclick="window.location.href='../Php/logout.php';"
      style="display:flex; align-items:center; gap:5px;">
      LOG OUT
      <img src="../Images/import.gif" alt="Logout Icon" style="height:1.5em; border-radius:6px;">
    </button>
  </div>
</header>


<!-- ================= MAIN CONTAINER ================= -->
<div class="container">

  <!-- ================= LEFT SIDEBAR ================= -->
  <div class="sidebar-left">

    <!-- Profile Card -->
    <div class="profile-card">

      <!-- Cover Photo -->
      <img src="../Images/cover_default.jpg" class="cover" alt="Cover Photo">

      <!-- Profile Picture -->
      <img src="../Images/default-profile.gif" class="profile-pic" alt="Profile Photo">

      <!-- Edit Button -->
      <button class="edit-btn" title="Edit Profile"
        onclick="location.href='../Html/User_profile.html'">
        <img src="../Images/pencil.gif" alt="Edit">
      </button>

      <h3>Najmul Nur</h3>

      <p class="user-bio">
        &#128172; Tell people a little about yourself by adding a bio in your profile.
      </p>

    </div>

    <!-- Contribution Section -->
    <div class="page-like">
      <h4>Make a Contribution</h4>

      <button class="donate-btn"
        onclick="window.location.href='../Html/Donated.html'">
        Donate Now
      </button>
    </div>

  </div>

</div>

</body>
</html>
