<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Profile - Searchar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <!-- Main CSS -->
  <link rel="stylesheet" href="../css/Policeman_Edit_profile.css">
</head>
<body>
  <!-- Navbar -->
  <header class="navbar">
    <div class="navbar-logo">
      <img src="../Images/logo.png" alt="SEARCHAR Logo" class="navbar-logo-img" id="logo">
    </div>
  </header>
<div class="bubble-background"></div>
  <!-- Main Content -->
  <main class="edit-profile-container">
 <div class="edit-profile-header-vertical">
    <img src="../Images/edit-profile.gif" alt="Edit Icon" class="edit-profile-icon-vertical">
    <h2>EDIT YOUR PROFILE</h2>
  </div>       <!-- Back Button -->
      <div class="back-button-container">
        <a href="../Html/Policeman_profile.html" class="back-btn">← Back</a>
      </div>
  </div>
    <form class="edit-profile-form" method="POST" enctype="multipart/form-data">
      
      <!-- Cover Photo -->
      <div class="cover-photo-section">
        <label for="coverPhoto" class="cover-label">Cover Photo</label>
        <div class="cover-preview">
          <img id="coverPreview" src="../Images/default-cover.gif" alt="Cover Photo Preview">
        </div>
        <input type="file" id="coverPhoto" name="coverPhoto" accept="image/*" onchange="previewImage(event, 'coverPreview')">
      </div>

      <!-- Profile Photo -->
      <div class="profile-photo-section">
        <label for="profilePhoto" class="profile-label">Profile Picture</label>
        <div class="profile-preview">
          <img id="profilePreview" src="../Images/default-profile.gif" alt="Profile Picture Preview">
        </div>
        <input type="file" id="profilePhoto" name="profilePhoto" accept="image/*" onchange="previewImage(event, 'profilePreview')">
      </div>

        <!-- Bio -->
        <label for="bio">Bio</label>
        <textarea id="bio" name="bio" placeholder="Write something about yourself..." maxlength="250"></textarea>

        <!-- Date of birth & Gender -->
        <label for="date_of_birth">Date of Birth</label>
        <input type="date" id="date_of_birth" name="date_of_birth">

        <label for="gender">Gender</label>
        <select id="gender" name="gender">
          <option value="">Prefer not to say</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>

        <input type="hidden" name="current_profile" id="current_profile">
        <input type="hidden" name="current_cover" id="current_cover">

      <!-- Name -->
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" required>

      <!-- Email -->
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <!-- Phone -->
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" pattern="[0-9]{10,15}" required>

      
<!-- Helper Instruction -->
<p class="map-helper-text" style="margin:12px 0 8px 0; color:#425a78; font-size:1em;">
  Please select your location by clicking the <b>Select location from map</b> button below.
</p>
<!-- Address Fields -->
<label for="street">Street Address</label>
<input type="text" id="street" name="street" placeholder="Enter street address">

<label for="city">City</label>
<input type="text" id="city" name="city" placeholder="Enter city">

<label for="postal">Postal Code</label>
<input type="text" id="postal" name="postal" placeholder="Enter postal code">

<label for="country">Country</label>
<input type="text" id="country" name="country" placeholder="Enter country">

<input type="hidden" id="latitude" name="latitude">
<input type="hidden" id="longitude" name="longitude">

<!-- Map Select Button -->
<button type="button" class="map-select-btn" onclick="selectLocationFromMap()">Select location from map</button>

<!-- Map Modal -->
<div id="mapModal" class="map-modal" style="display:none;">
  <div class="map-modal-content">
    <span class="map-close" onclick="closeMapModal()">&times;</span>
    <div id="map" style="width:100%;height:320px;"></div>
    <button id="currentLocationBtn" type="button" onclick="getCurrentLocation()">Use Current Location</button>
    <button id="saveLocationBtn" type="button" onclick="saveMapLocation()">Save Location</button>
  </div>
</div>

     <!-- Action Buttons -->
    <div class="profile-actions">
      <button type="button" class="cancel-btn" onclick="window.location.href='../Html/Policeman_profile.html'">Cancel</button>
      <button type="submit" class="save-btn">Save Changes</button>
    </div>
    </form>
  </main>

  <!-- JavaScript -->
  <script src="../javascrpit/Policeman_Edit_profile.js"></script>

  <script>
  // small preview helper (same as camera page)
  function previewImage(event, id) {
    const out = document.getElementById(id);
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) { out.src = e.target.result; };
    reader.readAsDataURL(file);
  }

  let map, marker, selectedLatLng;

  function selectLocationFromMap() {
    document.getElementById('mapModal').style.display = 'flex';
    initMap();
  }

  function closeMapModal() {
    document.getElementById('mapModal').style.display = 'none';
  }

  function initMap() {
    if (!map) {
      map = L.map('map').setView([23.8103, 90.4125], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);
      map.on('click', function(e) { setMarker(e.latlng); });
    }
    map.invalidateSize();
  }

  function setMarker(latlng) {
    selectedLatLng = latlng;
    if (marker) marker.setLatLng(latlng);
    else marker = L.marker(latlng).addTo(map);
  }

  function getCurrentLocation() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(pos) {
        const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        map.setView([latlng.lat, latlng.lng], 16);
        setMarker(latlng);
      }, function(err) {
        alert('Failed to get current location: ' + err.message);
      });
    } else {
      alert('Geolocation not supported by your browser');
    }
  }

  function saveMapLocation() {
    if (!selectedLatLng) { alert('Please select a location on the map!'); return; }
    const latEl = document.getElementById('latitude');
    const lonEl = document.getElementById('longitude');
    if (latEl) latEl.value = selectedLatLng.lat;
    if (lonEl) lonEl.value = selectedLatLng.lng;

    // Reverse geocode without custom User-Agent header (browsers block it)
    fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${selectedLatLng.lat}&lon=${selectedLatLng.lng}`)
      .then(response => { if (!response.ok) throw new Error('Reverse geocode failed'); return response.json(); })
      .then(data => {
        const streetEl = document.getElementById('street');
        const cityEl = document.getElementById('city');
        const postalEl = document.getElementById('postal');
        const countryEl = document.getElementById('country');
        if (streetEl) streetEl.value = data.address?.road || data.address?.neighbourhood || '';
        if (cityEl) cityEl.value = data.address?.city || data.address?.town || data.address?.village || '';
        if (postalEl) postalEl.value = data.address?.postcode || '';
        if (countryEl) countryEl.value = data.address?.country || '';
        closeMapModal();
      })
      .catch(err => { console.error('Reverse geocoding error:', err); alert('Failed to get address. You can fill it manually.'); closeMapModal(); });
  }
  </script>

</body>
</html>
